version: '3'

services:
  # Backend service (unchanged, does not expose ports externally, only to gateway)
  backend:
    image: ailm32442/super-agent-party:latest
    container_name: sap-backend
    restart: unless-stopped
    volumes:
      - ./super-agent-data:/app/data
    # Removed ports mapping, as we will access through gateway

  # Frontend gateway service
  gateway:
    image: ailm32442/nginx-for-sap:latest
    container_name: sap-gateway
    restart: unless-stopped
    ports:
      - "3456:3456"  # Externally exposed port
    environment:
      - JWT_SECRET=ChangeThisToARandomString123!
      - INIT_USER=root
      - INIT_PASS=pass
      # If you forgot your password, set this to true, restart the container to reset to root/pass, then set back to false or delete
      - FORCE_RESET=false
    volumes:
      - ./gateway-data:/data # Persist state after password changes
    depends_on:
      - backend